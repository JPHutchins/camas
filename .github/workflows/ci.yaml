name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - run: uv run --python ${{ matrix.python-version }} task format-check

      - run: uv run --python ${{ matrix.python-version }} task lint

      - run: uv run --python ${{ matrix.python-version }} task typecheck

      - run: uv run --python ${{ matrix.python-version }} task test

      - run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            dist/*.tar.gz
            dist/*.whl

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - run: uv run task coverage

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [lint-and-test, coverage]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/camas
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - run: uv build

      - uses: pypa/gh-action-pypi-publish@release/v1
