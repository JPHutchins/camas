name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

jobs:
  example:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - run: uv run camas matrix --effects='(Summary(SummaryOptions(Fixed(120))),)'

      - run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.tar.gz
            dist/*.whl

  check:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6

      - run: uv run camas check --effects='(Summary(SummaryOptions(Fixed(120))),)'
        env:
          UV_PYTHON: ${{ matrix.python }}

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - run: uv run camas coverage --effects='(Summary(SummaryOptions(Fixed(120), show_passing=True)),)'

      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests

  tauri-fixture:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/fixtures/tauri-app
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: tests/fixtures/tauri-app/.nvmrc

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
        working-directory: .

      - run: uv tool install .
        working-directory: .

      - run: npm ci

      - run: camas check --effects='(Summary(SummaryOptions(Fixed(120))),)'

      - run: camas build --effects='(Summary(SummaryOptions(Fixed(120))),)'

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [check, coverage]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/camas
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - run: uv build

      - uses: pypa/gh-action-pypi-publish@release/v1
