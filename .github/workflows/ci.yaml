name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

jobs:
  example:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Diagnose zuban-Windows-3.10
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          UV_PROJECT_ENVIRONMENT: .venv-3.10
        run: |
          uv sync --python=3.10
          Write-Host "=== pyvenv.cfg ==="
          Get-Content .venv-3.10\pyvenv.cfg
          Write-Host "=== site-packages top level ==="
          Get-ChildItem .venv-3.10\Lib\site-packages | Select-Object -First 60 Name
          Write-Host "=== pytest on disk? ==="
          if (Test-Path .venv-3.10\Lib\site-packages\pytest) { Write-Host "YES: pytest dir exists" } else { Write-Host "NO: pytest dir missing" }
          Write-Host "=== import pytest via venv python ==="
          .venv-3.10\Scripts\python.exe -c "import pytest; print('pytest at', pytest.__file__)"
          Write-Host "=== zuban check (first 40 lines) ==="
          uv run zuban check 2>&1 | Select-Object -First 40
          Write-Host "=== zuban --help (look for verbose flags) ==="
          uv run zuban --help 2>&1 | Select-Object -First 40

      - run: uv run camas matrix --effects='(Summary(SummaryOptions(Fixed(120))),)'
        env:
          UV_NO_CACHE: "1"

      - run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.tar.gz
            dist/*.whl

  check:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6

      - run: uv run camas check --effects='(Summary(SummaryOptions(Fixed(120))),)'
        env:
          UV_PYTHON: ${{ matrix.python }}

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - run: uv run camas coverage --effects='(Summary(),)'

      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [check, coverage]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/camas
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - run: uv build

      - uses: pypa/gh-action-pypi-publish@release/v1
