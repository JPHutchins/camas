name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

jobs:
  example:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Probe 3.10-vs-3.15 on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($ver in @("3.10", "3.15")) {
            $venv = ".venv-$ver"
            Write-Host "================ $ver ================"
            $env:UV_PROJECT_ENVIRONMENT = $venv
            $env:UV_PYTHON = $ver
            uv sync --python=$ver
            Write-Host "--- which python uv picked ---"
            Get-Content "$venv\pyvenv.cfg"
            Write-Host "--- sys.executable / sys.prefix / sys.base_prefix ---"
            & "$venv\Scripts\python.exe" -c "import sys; print('executable=', sys.executable); print('prefix=', sys.prefix); print('base_prefix=', sys.base_prefix); print('base_executable=', getattr(sys, '_base_executable', 'n/a'))"
            Write-Host "--- sys.path ---"
            & "$venv\Scripts\python.exe" -c "import sys; [print(' ', p) for p in sys.path]"
            Write-Host "--- import pytest ---"
            & "$venv\Scripts\python.exe" -c "import pytest; print('pytest ok at', pytest.__file__)"
            Write-Host "--- Scripts\python.exe vs target ---"
            Get-Item "$venv\Scripts\python.exe" | Format-List FullName, LinkType, Target
            Write-Host "--- zuban check (first 20 lines) ---"
            $env:UV_NO_SYNC = "1"
            uv run zuban check 2>&1 | Select-Object -First 20
            Remove-Item env:UV_NO_SYNC
            Write-Host ""
          }

      - run: uv run camas matrix --effects='(Summary(SummaryOptions(Fixed(120))),)'

      - run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.tar.gz
            dist/*.whl

  check:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6

      - run: uv run camas check --effects='(Summary(SummaryOptions(Fixed(120))),)'
        env:
          UV_PYTHON: ${{ matrix.python }}

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - run: uv run camas coverage --effects='(Summary(),)'

      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [check, coverage]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/camas
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - run: uv build

      - uses: pypa/gh-action-pypi-publish@release/v1
