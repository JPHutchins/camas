name: Claude Code hook harness

# Runs the opt-in Claude Code integration suite (tests/claude_code/) against a REAL headless
# `claude -p`, to catch drift in the hook contract camas depends on — that PostToolBatch fires on
# an edit and delivers the changed path on stdin, that ${file_path} is not interpolated, and that
# the shipped autofix hook actually runs the registered fix node end to end — and that the full
# plugin chain (install → edit → gate → fix) the camas-fixer subagent drives through the MCP tools
# works against a real Claude Code: camas mcp init --claude produces a loadable surface, the shipped
# PostToolBatch hook fires, and the fixer reaches green via the MCP camas_gate tool.
#
# It uses the same DeepSeek backend the agentic review workflow does (ANTHROPIC_BASE_URL +
# ANTHROPIC_AUTH_TOKEN=MODEL_API_KEY, a burner key with a hard spend cap), on the cheap
# deepseek-v4-flash tier. The schedule catches a Claude Code release changing the contract even
# when camas itself has not changed.
on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday — catch a Claude Code release changing the hook contract
  push:
    paths:
      - "src/camas/**"
      - "src/camas/main/claude_*.md"
      - "tests/claude_code/**"
      - "tests/plugin/**"
      - ".mcp.json"
      - ".claude/**"
      - ".github/workflows/claude-code-harness.yaml"

jobs:
  harness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      # uv comes from PyPI (already allowlisted) rather than astral-sh/setup-uv, which resolves
      # versions via raw.githubusercontent.com and pulls the binary from releases.astral.sh — both
      # would need allowlisting. harden-runner enforces from its pre-step, so the lock covers setup
      # too regardless of step order; every host setup touches must be on the allowlist below.
      - name: Install uv (pinned)
        run: |
          pipx install --force uv==0.9.15
          pipx environment --value PIPX_BIN_DIR >> "$GITHUB_PATH"
      - run: uv --version

      - run: npm install -g @anthropic-ai/claude-code@2.1.197

      # Allowlist = the hosts setup (uv wheels from PyPI, claude-code from npm) and the headless
      # suite (DeepSeek) reach; a blocked host shows in this step's summary.
      - name: Lock network egress
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.deepseek.com:443
            pypi.org:443
            files.pythonhosted.org:443
            registry.npmjs.org:443
            github.com:443
            objects.githubusercontent.com:443

      # The contract suite needs any interpreter >=3.10; --python 3.12 pins the runner's system
      # Python so uv does not download the .python-version default (3.14) from a GitHub release
      # asset host that is not on the allowlist. UV_PYTHON_DOWNLOADS=never makes a missing one fail
      # fast, before the DeepSeek-billed run.
      - name: Run the Claude Code integration suite
        env:
          CAMAS_CC_E2E: "1"
          CAMAS_CC_MODEL: deepseek-v4-flash
          ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.MODEL_API_KEY }}
          # The camas-fixer subagent is model: haiku; point the haiku tier at DeepSeek so the
          # fixer-loop test (criterion #3) drives a real subagent round-trip, as claude-code-review does.
          ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
          CLAUDE_CODE_SUBAGENT_MODEL: deepseek-v4-flash
          UV_PYTHON_DOWNLOADS: never
        run: |
          [ -n "$ANTHROPIC_AUTH_TOKEN" ] || { echo "::error::MODEL_API_KEY secret is not set"; exit 1; }
          uv run --python 3.12 pytest tests/claude_code/ -v --no-cov -p no:cacheprovider
