name: Claude Code review (collect)

# Unprivileged half of the review relay (GitHub Security Lab "preventing pwn requests").
# Runs on every PR with contents:read and posts NOTHING — it just captures the PR's diff as an
# inert artifact for the privileged "Claude Code review" workflow. Same-repo and
# fork PRs are treated identically: all review and commenting happen in the privileged
# workflow, so there is a single code path to maintain.
on:
  pull_request:
    # Naming types replaces the default set, so list all four explicitly — ready_for_review lets
    # marking a draft PR ready trigger a review without a new commit (#138); the !draft gate below
    # still holds on that event.
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

# Cancel a superseded collect run when a newer commit lands on the same PR head; resolves to the
# same head branch this workflow_run's review keys on, so the whole relay is cancelled together.
concurrency:
  group: claude-review-collect-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  collect:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Capture the PR diff
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          mkdir -p out
          git fetch --no-tags origin "$BASE_REF"
          git diff "origin/${BASE_REF}...HEAD" >out/pr.diff

      - uses: actions/upload-artifact@v7
        with:
          name: claude-code-review
          path: out/
          retention-days: 3
