# Code review — thin consumer of the code-review reusable workflow.
# The full pipeline lives in the pinned ref; this repo keeps only the trigger, the superset
# permissions, the MODEL_API_KEY secret, and .github/prices.json. Bump the @ref to upgrade.
# See: https://github.com/JPHutchins/code-review

name: Code review

on:
  workflow_run:
    workflows: ["CI"]       # our CI workflow name — unmodified
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      (github.event.workflow_run.conclusion == 'success' ||
       github.event.workflow_run.conclusion == 'failure')
    uses: JPHutchins/code-review/.github/workflows/review-reusable.yaml@v0.1.0-alpha.23
    with:
      head_sha:      ${{ github.event.workflow_run.head_sha }}
      head_branch:   ${{ github.event.workflow_run.head_branch }}
      head_repo:     ${{ github.event.workflow_run.head_repository.full_name }}
      run_id:        ${{ github.event.workflow_run.id }}
      conclusion:    ${{ github.event.workflow_run.conclusion }}
      trigger_event: ${{ github.event.workflow_run.event }}
      api_base_url:  ${{ vars.API_BASE_URL }}
      model_full:    deepseek-v4-pro
      model_mechanic: deepseek-v4-flash
      # Python check-running, egress-minimal: install uv via pipx from PyPI (already allowlisted)
      # rather than setup-uv (which pulls from raw.githubusercontent.com + releases.astral.sh). Export
      # uv onto PATH and UV_PYTHON_DOWNLOADS=never to the agent step via $GITHUB_PATH/$GITHUB_ENV so
      # the agent's own `uv run` reuses the synced system Python instead of fetching one.
      install_command: |
        pipx install --force uv==0.9.15
        PIPX_BIN="$(pipx environment --value PIPX_BIN_DIR)"
        echo "$PIPX_BIN" >> "$GITHUB_PATH"
        export PATH="$PIPX_BIN:$PATH"
        echo "UV_PYTHON_DOWNLOADS=never" >> "$GITHUB_ENV"
        UV_PYTHON_DOWNLOADS=never uv sync --python 3.12
      # Single line, not a block scalar: the reusable workflow splices this value into harden-runner's
      # folded allowed-endpoints AFTER YAML parsing, so embedded newlines reach the endpoint parser
      # verbatim and break it (pypi.org parsed with port 0, the next host dropped).
      # release-assets: actionlint-py is sdist-only and its build backend downloads the actionlint
      # binary from the GitHub release-asset host during any fresh `uv sync`.
      extra_endpoints: pypi.org:443 files.pythonhosted.org:443 release-assets.githubusercontent.com:443
      mechanic_time_limit: 3m
      mechanic_grace_period: 90s
      full_review_time_limit: 24m
      full_review_grace_period: 12m
    secrets:
      MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
