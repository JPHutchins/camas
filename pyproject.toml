[project]
name = "camas"
description = "Generic parallel/sequential task runner"
readme = "README.md"
license = "MIT"
authors = [{ name = "JP Hutchins", email = "jphutchins@gmail.com" }]
requires-python = ">=3.12"
dependencies = []
dynamic = ["version"]
keywords = ["task-runner", "parallel", "sequential", "async"]
classifiers = [
"Development Status :: 3 - Alpha",
"Intended Audience :: Developers",
"License :: OSI Approved :: MIT License",
"Programming Language :: Python :: 3",
"Programming Language :: Python :: 3.12",
"Programming Language :: Python :: 3.13",
"Programming Language :: Python :: 3.14",
"Programming Language :: Python :: 3.15",
"Topic :: Software Development :: Build Tools",
"Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/JPHutchins/camas"
Repository = "https://github.com/JPHutchins/camas"
Issues = "https://github.com/JPHutchins/camas/issues"

[project.scripts]
camas = "camas.main:main"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[dependency-groups]
dev = [
"mypy>=1.19,<2",
"pyright>=1.1.408,<2",
"pytest>=9,<10",
"pytest-cov>=7,<8",
"cyclopts>=4,<5",
"ruff>=0.12,<1",
"ty>=0.0.31,<1",
"zuban>=0.7,<1",
"pyrefly>=0.61,<1",
]

[tool.camas.tasks]
format = "uv run ruff format ."
lint = "uv run ruff check ."
mypy = "uv run mypy ."
ty = "uv run ty check"
zuban = "uv run zuban check"
pyrefly = "uv run pyrefly check"
pyright = "uv run pyright src tests"
typecheck = "Parallel(tasks=(mypy, pyright, ty, zuban, pyrefly))"
test = "pytest --doctest-modules -v -m 'not slow'"
coverage = "pytest --doctest-modules -m 'not slow' --cov --cov-report=term-missing"
all = '''
Sequential(tasks=(
    format,
    Parallel(tasks=(lint, typecheck, test)),
))
'''
matrix = '''
Parallel(
    tasks=(all,),
    matrix={"UV_PROJECT_ENVIRONMENT": (
		".venv-3.12",
		".venv-3.13",
		".venv-3.14",
		".venv-3.15",
	)},
)
'''

[tool.pytest.ini_options]
testpaths = ["src", "tests"]
markers = ["slow: visual demo tests with real delays"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
extend-select = ["I"]

[tool.ruff.format]
indent-style = "tab"

[tool.mypy]
strict = true
warn_unused_ignores = true

[tool.pyright]
typeCheckingMode = "strict"
include = ["src", "tests"]

[tool.coverage.run]
source = ["camas", "tests"]
branch = true
omit = ["tests/test_demos.py", "src/camas/__main__.py"]

[tool.coverage.report]
fail_under = 100
partial_branches = ["pragma: no branch", "case LeafInfo", "case Waiting"]
exclude_also = ["async for .* in proc\\.stdout"]
exclude_lines = [
"@overload",
"assert_never",
"case _:",
"pragma: no cover",
"if __name__ == .__main__.:",
"if TYPE_CHECKING",
':\s*\.\.\.\s*$',
'^\s*\.\.\.\s*$',
"raise AssertionError",
"@pytest.mark.slow",
"@app.command",
]
